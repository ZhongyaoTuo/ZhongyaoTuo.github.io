<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

<!-- Bilingual support: set lang class on body, toggle nav & author profile -->
<script>
function applyLanguage(lang) {
  document.documentElement.setAttribute('data-lang', lang);

  // Switch nav labels & URLs, and author profile links
  document.querySelectorAll('.greedy-nav .visible-links a, .greedy-nav .hidden-links a, .author__urls a').forEach(function(a) {
    var zhText = a.getAttribute('data-zh');
    var enText = a.getAttribute('data-en');
    var zhUrl  = a.getAttribute('data-zh-url');
    var enUrl  = a.getAttribute('data-en-url');
    var labelSpan = a.querySelector('.nav-label');
    if (lang === 'en' && enText) {
      if (labelSpan) { labelSpan.textContent = enText; }
      else { a.innerHTML = '<span class="nav-label">' + enText + '</span>'; }
      if (enUrl) a.setAttribute('href', enUrl);
    } else if (lang === 'zh' && zhText) {
      if (labelSpan) { labelSpan.textContent = zhText; }
      else { a.innerHTML = '<span class="nav-label">' + zhText + '</span>'; }
      if (zhUrl) a.setAttribute('href', zhUrl);
    }
  });

  // Toggle author profile & any [data-lang] sections
  document.querySelectorAll('[data-lang]').forEach(function(el) {
    el.style.display = el.getAttribute('data-lang') === lang ? '' : 'none';
  });
}

(function() {
  var lang = localStorage.getItem('site-language') || 'zh';

  // Run immediately if DOM already parsed, else on ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { applyLanguage(lang); });
  } else {
    applyLanguage(lang);
  }

  // Add language toggle button
  var btn = document.createElement('button');
  btn.id = 'lang-toggle-btn';
  btn.innerHTML = lang === 'zh' ? '🌐 English' : '🌐 中文';
  btn.onclick = function() {
    var next = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('site-language', next);
    window.location.href = next === 'zh' ? '/home-zh/' : '/home-en/';
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { document.body.appendChild(btn); });
  } else {
    document.body.appendChild(btn);
  }
})();
</script>

<style>
#lang-toggle-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  background: #667eea;
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 10px 18px;
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(102,126,234,0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.9;
}
#lang-toggle-btn:hover {
  opacity: 1;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102,126,234,0.6);
}
</style>
